spring:
  application:
    name: yike-ai-mother-backend
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yike_ai_mother
    username: yike_ai_mother_user
    password: 20040906cYc

  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 20040906cYc
      ttl: 3600 # 缓存过期时间（秒）
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yike.yikeaimother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always